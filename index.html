<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Calculator Tools</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f4f8;
}

.container{

    max-width:900px;
    margin:80px auto;
    text-align:center;

}

h1{

    color:#163b65;

}

.card{

    display:inline-block;

    width:280px;

    margin:25px;

    padding:30px;

    border-radius:12px;

    background:white;

    box-shadow:0 5px 15px rgba(0,0,0,.12);

}

a.button{

    display:inline-block;

    margin-top:20px;

    padding:14px 28px;

    background:#163b65;

    color:white;

    text-decoration:none;

    border-radius:8px;

    font-weight:bold;

}

a.button:hover{

    background:#21507f;

}

</style>

</head>

<body>

<div class="container">

<h1>Calculator Tools</h1>

<p>Select the calculator you would like to use.</p>

<div class="card">

<h2>TI-84 Graphing Calculator</h2>

<a class="button"
   href="ti84.html">
Launch
</a>

</div>

<div class="card">

<h2>TI-30XS Scientific Calculator</h2>

<a class="button"
   href="ti30xs.html">
Launch
</a>

</div>

</div>

</body>
</html>
