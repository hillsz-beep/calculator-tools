<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>TI-84 Graphing Calculator</title>

<style>

html,body{

margin:0;
height:100%;
overflow:hidden;
background:white;

}

.wrapper{

position:relative;
width:100%;
height:100vh;
overflow:hidden;

}

iframe{

position:absolute;

top:-155px;

left:50%;

width:1180px;

height:1250px;

border:0;

transform:translateX(-50%);

}

</style>

</head>

<body>

<div class="wrapper">

<iframe

src="https://ti84calc.com/ti84calc"

allowfullscreen

loading="eager">

</iframe>

</div>

</body>

</html>
